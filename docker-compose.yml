version: '3.8'

services:
  app:
    build: .
    container_name: nutriplan-web
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    ports:
      - "9000:80"
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: nutriplan-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nutriplan-db
      MYSQL_USER: nutriplan
      MYSQL_PASSWORD: Dmystzz27[06]
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
  
  phpmyadmin:
    image: phpmyadmin
    container_name: nutriplan-pma
    restart: unless-stopped
    ports:
      - "9001:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db

volumes:
  dbdata: